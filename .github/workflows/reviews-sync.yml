name: Reviews Sync

on:
  schedule:
    # Run every 2 hours; launch/change promotions still land quickly without hourly pooler churn.
    - cron: '15 */2 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of apps to process'
        required: false
        default: '100'

concurrency:
  group: reviews-sync
  cancel-in-progress: false

env:
  DATA_READ_TARGET: tiger
  DATA_WRITE_TARGET: tiger
  TIGER_PRIMARY_URL: ${{ secrets.TIGER_PRODUCTION_URL }}

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_TIGER_METRICS_WRITERS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run Reviews sync
        run: pnpm --filter @publisheriq/ingestion reviews-sync
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '2500' }}
          MAX_RUNTIME_MINUTES: '50'
          CLAIM_BATCH_SIZE: '100'
          CLAIM_TTL_MINUTES: '15'
          CLAIM_TIMEOUT_RETRIES: '3'
          REVIEWS_LAUNCH_LIMIT: '25'
          REVIEWS_CHANGE_LIMIT: '20'
          REVIEWS_ACTIVE_LIMIT: '35'
          REVIEWS_BACKFILL_LIMIT: '19'
          REVIEWS_UNKNOWN_LIMIT: '1'

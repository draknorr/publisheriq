name: Review Histogram Sync

on:
  schedule:
    # Run every 30 minutes (offset +7) for aggressive first-pass completion
    - cron: '7,37 * * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of apps to process'
        required: false
        default: '100'

env:
  DATA_READ_TARGET: tiger
  DATA_WRITE_TARGET: tiger
  TIGER_PRIMARY_URL: ${{ secrets.TIGER_PRODUCTION_URL }}

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_TIGER_METRICS_WRITERS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run Histogram sync
        run: pnpm --filter @publisheriq/ingestion histogram-sync
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '2000' }}

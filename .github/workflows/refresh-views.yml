name: Refresh Materialized Views

on:
  workflow_dispatch:
  # Re-enable the daily schedule after the
  # 20260407075000_optimize_latest_daily_metrics_refresh migration is applied
  # and latest_daily_metrics refresh timing is verified in production.
  # schedule:
  #   - cron: '0 5 * * *'

concurrency:
  group: refresh-materialized-views
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  refresh:
    # Legacy Supabase writer disabled during Tiger-primary cutover.
    if: ${{ vars.ENABLE_LEGACY_SUPABASE_WRITERS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Refresh heavy materialized view chain
        run: |
          set -euo pipefail

          refresh_view() {
            local view="$1"
            local statement_timeout="$2"
            local lock_timeout="${3:-15s}"
            local start_time end_time duration

            echo "Refreshing ${view} (statement_timeout=${statement_timeout}, lock_timeout=${lock_timeout})..."
            start_time=$(date +%s)

            psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 \
              -c "SET statement_timeout TO '${statement_timeout}'" \
              -c "SET lock_timeout TO '${lock_timeout}'" \
              -c "REFRESH MATERIALIZED VIEW CONCURRENTLY ${view};"

            end_time=$(date +%s)
            duration=$((end_time - start_time))
            echo "Refreshed ${view} in ${duration}s"
          }

          echo "Refreshing heavy materialized views..."

          # Refresh in dependency order. Small filter-count views stay on pg_cron.
          refresh_view latest_daily_metrics 10min
          refresh_view publisher_metrics 10min
          refresh_view developer_metrics 10min
          refresh_view publisher_year_metrics 10min
          refresh_view developer_year_metrics 10min
          refresh_view publisher_game_metrics 10min
          refresh_view developer_game_metrics 10min
          refresh_view monthly_game_metrics 5min
          refresh_view mv_apps_aggregate_stats 2min

          echo "Heavy materialized views refreshed successfully."

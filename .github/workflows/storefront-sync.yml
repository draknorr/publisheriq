name: Storefront Details Sync

on:
  schedule:
    # Run every 2 hours; hint-driven change-intel now carries the changed-app freshness SLA.
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of apps to process per partition'
        required: false
        default: '50'

env:
  CHANGE_INTEL_ARCHIVE_ACCESS_KEY_ID: ${{ secrets.CHANGE_INTEL_ARCHIVE_ACCESS_KEY_ID }}
  CHANGE_INTEL_ARCHIVE_BUCKET: publisheriq-change-intel-archive
  CHANGE_INTEL_ARCHIVE_ENDPOINT: ${{ secrets.CHANGE_INTEL_ARCHIVE_ENDPOINT }}
  CHANGE_INTEL_ARCHIVE_FORCE_PATH_STYLE: "true"
  CHANGE_INTEL_ARCHIVE_PREFIX: production/change-intel
  CHANGE_INTEL_ARCHIVE_REGION: auto
  CHANGE_INTEL_ARCHIVE_SECRET_ACCESS_KEY: ${{ secrets.CHANGE_INTEL_ARCHIVE_SECRET_ACCESS_KEY }}
  CHANGE_INTEL_ARCHIVE_TARGET: object_storage
  CHANGE_INTEL_READ_TARGET: tiger
  CHANGE_INTEL_WRITE_TARGET: tiger
  DATA_READ_TARGET: tiger
  DATA_WRITE_TARGET: tiger
  TIGER_PRIMARY_URL: ${{ secrets.TIGER_PRODUCTION_URL }}

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_TIGER_CATALOG_WRITERS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        partition: [0, 1, 2, 3, 4, 5]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run Storefront sync (partition ${{ matrix.partition }})
        run: pnpm --filter @publisheriq/ingestion storefront-sync
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '800' }}
          PARTITION_COUNT: 6
          PARTITION_ID: ${{ matrix.partition }}

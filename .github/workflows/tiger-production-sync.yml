name: Tiger Production Sync

on:
  schedule:
    - cron: "45 7 * * *"
  workflow_dispatch:
    inputs:
      metrics_lookback_days:
        description: "How many trailing UTC days to replay into metrics.daily_metrics"
        required: false
        default: "7"
      projection_day_lookback:
        description: "How many trailing UTC days of projection churn to replay during events/news reconcile"
        required: false
        default: "7"
      projection_repair_scope:
        description: "Projection repair scope for events/news reconcile (recent_window or exact_parity)"
        required: false
        default: "recent_window"
      legacy_tables:
        description: "Optional comma-separated LEGACY_BACKFILL_TABLES override"
        required: false
        default: ""

concurrency:
  group: tiger-production-sync
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  TIGER_PRIMARY_URL: ${{ secrets.TIGER_PRODUCTION_URL }}
  DATA_PLANE_STATEMENT_TIMEOUT_MS: "15000"
  METRICS_LOOKBACK_DAYS: ${{ github.event.inputs.metrics_lookback_days || '7' }}
  PROJECTION_DAY_LOOKBACK: ${{ github.event.inputs.projection_day_lookback || '7' }}
  PROJECTION_REPAIR_SCOPE: ${{ github.event.inputs.projection_repair_scope || 'recent_window' }}
  LEGACY_BACKFILL_TABLES: ${{ github.event.inputs.legacy_tables || '' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sync packages
        run: pnpm --filter @publisheriq/shared build && pnpm --filter @publisheriq/data-plane build

      - name: Compute sync windows
        run: |
          echo "TIGER_RUN_DATE=$(date -u +%F)" >> "$GITHUB_ENV"
          echo "METRICS_BACKFILL_DATE_TO=$(date -u +%F)" >> "$GITHUB_ENV"
          echo "METRICS_BACKFILL_DATE_FROM=$(date -u -d "${METRICS_LOOKBACK_DAYS} days ago" +%F)" >> "$GITHUB_ENV"

      - name: Backfill legacy compatibility slice
        run: pnpm tiger:backfill-legacy

      - name: Backfill recent daily metrics
        run: pnpm tiger:backfill-daily-metrics
        env:
          METRICS_BACKFILL_MANIFEST_LABEL: tiger-production-metrics-${{ github.run_id }}

      - name: Reconcile Tiger events and news
        id: reconcile_events_news
        continue-on-error: true
        run: pnpm tiger:reconcile-events-news
        env:
          DATA_PLANE_STATEMENT_TIMEOUT_MS: "120000"
          EVENTS_NEWS_SYNC_EVENT_DAY_LOOKBACK: "3"
          EVENTS_NEWS_SYNC_MANIFEST_LABEL: tiger-production-events-reconcile-${{ github.run_id }}
          EVENTS_NEWS_SYNC_MODE: reconcile
          EVENTS_NEWS_SYNC_NEWS_DAY_LOOKBACK: "7"
          EVENTS_NEWS_SYNC_PROJECTION_DAY_LOOKBACK: ${{ env.PROJECTION_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_REPAIR_SCOPE: ${{ env.PROJECTION_REPAIR_SCOPE }}

      - name: Inspect Tiger events/news reconcile manifest
        id: inspect_reconcile_manifest
        if: always()
        env:
          RECONCILE_MANIFEST_PATH: docs/reference/tiger-target-baseline/${{ env.TIGER_RUN_DATE }}/tiger-production-events-reconcile-${{ github.run_id }}/events-news-sync-manifest.json
          RECONCILE_OUTCOME: ${{ steps.reconcile_events_news.outcome }}
          REQUESTED_PROJECTION_REPAIR_SCOPE: ${{ env.PROJECTION_REPAIR_SCOPE }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const outputPath = process.env.GITHUB_OUTPUT;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const manifestPath = process.env.RECONCILE_MANIFEST_PATH;
          const reconcileOutcome = process.env.RECONCILE_OUTCOME;
          const requestedScope = process.env.REQUESTED_PROJECTION_REPAIR_SCOPE ?? 'recent_window';

          function setOutput(name, value) {
            fs.appendFileSync(outputPath, `${name}=${value}\n`);
          }

          function appendSummary(line) {
            if (summaryPath) {
              fs.appendFileSync(summaryPath, `${line}\n`);
            }
          }

          const defaults = {
            classification: 'initial_reconcile_succeeded',
            manifest_found: 'false',
            manifest_parsed: 'false',
            needs_exact_parity_fallback: 'false',
            validate_projection_repair_scope: requestedScope,
          };

          for (const [key, value] of Object.entries(defaults)) {
            setOutput(key, value);
          }

          if (reconcileOutcome !== 'failure') {
            appendSummary(`Initial Tiger events/news reconcile succeeded with scope \`${requestedScope}\`.`);
            process.exit(0);
          }

          if (!manifestPath || !fs.existsSync(manifestPath)) {
            setOutput('classification', 'missing_manifest');
            appendSummary(
              `Initial Tiger events/news reconcile failed and did not produce a manifest at \`${manifestPath ?? '(missing path)'}\`.`
            );
            process.exit(0);
          }

          setOutput('manifest_found', 'true');

          let manifest;
          try {
            manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          } catch (error) {
            setOutput('classification', 'malformed_manifest');
            appendSummary(
              `Initial Tiger events/news reconcile failed and the manifest at \`${manifestPath}\` could not be parsed: ${error.message}`
            );
            process.exit(0);
          }

          setOutput('manifest_parsed', 'true');

          const tableSummaries = Array.isArray(manifest.tableSummaries) ? manifest.tableSummaries : [];
          const validations = manifest.validations ?? {};
          const steamNewsItems = tableSummaries.find(
            (summary) => summary?.tableName === 'steam_news_items'
          );
          const appChangeEvents = tableSummaries.find(
            (summary) => summary?.tableName === 'app_change_events'
          );
          const projection = tableSummaries.find(
            (summary) => summary?.tableName === 'steam_news_search_projection'
          );

          const duplicateEventIds = Number(validations.duplicateEventIds ?? Number.NaN);
          const orphanedNewsItemGids = Number(validations.orphanedNewsItemGids ?? Number.NaN);
          const projectionRowsMissingNewsItems = Number(
            validations.projectionRowsMissingNewsItems ?? Number.NaN
          );
          const projectionMonthMismatches = Array.isArray(projection?.monthMismatchesAfter)
            ? projection.monthMismatchesAfter.length
            : -1;
          const projectionDayMismatches = Array.isArray(projection?.dayMismatchesAfter)
            ? projection.dayMismatchesAfter.length
            : -1;

          const needsExactParityFallback =
            requestedScope === 'recent_window' &&
            manifest.success === false &&
            steamNewsItems?.passed === true &&
            appChangeEvents?.passed === true &&
            projection?.passed === false &&
            projectionMonthMismatches > 0 &&
            projectionDayMismatches === 0 &&
            duplicateEventIds === 0 &&
            orphanedNewsItemGids === 0 &&
            projectionRowsMissingNewsItems === 0;

          if (needsExactParityFallback) {
            setOutput('classification', 'historical_projection_drift');
            setOutput('needs_exact_parity_fallback', 'true');
            setOutput('validate_projection_repair_scope', 'exact_parity');
            appendSummary(
              `Initial Tiger events/news reconcile failed due only to historical projection drift. Running projection-only \`exact_parity\` fallback before final validate.`
            );
            process.exit(0);
          }

          const classification =
            requestedScope !== 'recent_window'
              ? 'initial_reconcile_failed_without_recent_window_scope'
              : steamNewsItems?.passed !== true
                ? 'steam_news_items_failed'
                : appChangeEvents?.passed !== true
                  ? 'app_change_events_failed'
                  : duplicateEventIds !== 0 ||
                      orphanedNewsItemGids !== 0 ||
                      projectionRowsMissingNewsItems !== 0
                    ? 'integrity_validation_failed'
                    : projection?.passed !== false
                      ? 'unexpected_projection_summary'
                      : projectionDayMismatches > 0
                        ? 'projection_recent_window_drift'
                        : projectionMonthMismatches > 0
                          ? 'projection_nonrecoverable_drift'
                          : 'reconcile_failed_unknown_shape';

          setOutput('classification', classification);
          appendSummary(
            `Initial Tiger events/news reconcile failed without eligible fallback. Classification: \`${classification}\`.`
          );
          NODE

      - name: Fail on non-recoverable Tiger events/news reconcile failure
        if: steps.reconcile_events_news.outcome == 'failure' && steps.inspect_reconcile_manifest.outputs.needs_exact_parity_fallback != 'true'
        env:
          RECONCILE_CLASSIFICATION: ${{ steps.inspect_reconcile_manifest.outputs.classification }}
          RECONCILE_MANIFEST_PATH: docs/reference/tiger-target-baseline/${{ env.TIGER_RUN_DATE }}/tiger-production-events-reconcile-${{ github.run_id }}/events-news-sync-manifest.json
        run: |
          {
            echo "Tiger events/news reconcile failed without an eligible exact-parity fallback."
            echo ""
            echo "- classification: \`${RECONCILE_CLASSIFICATION}\`"
            echo "- manifest: \`${RECONCILE_MANIFEST_PATH}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Tiger events/news reconcile failed without an eligible exact-parity fallback." >&2
          echo "classification=${RECONCILE_CLASSIFICATION}" >&2
          echo "manifest=${RECONCILE_MANIFEST_PATH}" >&2
          exit 1

      - name: Reconcile Tiger projection exact parity fallback
        if: steps.inspect_reconcile_manifest.outputs.needs_exact_parity_fallback == 'true'
        run: pnpm tiger:reconcile-events-news
        env:
          DATA_PLANE_STATEMENT_TIMEOUT_MS: "120000"
          EVENTS_NEWS_SYNC_EVENT_DAY_LOOKBACK: "3"
          EVENTS_NEWS_SYNC_MANIFEST_LABEL: tiger-production-events-reconcile-exact-parity-${{ github.run_id }}
          EVENTS_NEWS_SYNC_MODE: reconcile
          EVENTS_NEWS_SYNC_NEWS_DAY_LOOKBACK: "7"
          EVENTS_NEWS_SYNC_PROJECTION_DAY_LOOKBACK: ${{ env.PROJECTION_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_REPAIR_SCOPE: exact_parity
          EVENTS_NEWS_SYNC_TABLES: steam_news_search_projection

      - name: Validate Tiger events and news parity
        run: pnpm tiger:reconcile-events-news
        env:
          DATA_PLANE_STATEMENT_TIMEOUT_MS: "120000"
          EVENTS_NEWS_SYNC_EVENT_DAY_LOOKBACK: "3"
          EVENTS_NEWS_SYNC_MANIFEST_LABEL: tiger-production-events-validate-${{ github.run_id }}
          EVENTS_NEWS_SYNC_MODE: validate
          EVENTS_NEWS_SYNC_NEWS_DAY_LOOKBACK: "7"
          EVENTS_NEWS_SYNC_PROJECTION_DAY_LOOKBACK: ${{ env.PROJECTION_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_REPAIR_SCOPE: ${{ steps.inspect_reconcile_manifest.outputs.validate_projection_repair_scope }}

      - name: Upload Tiger production sync manifests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiger-production-sync-${{ github.run_id }}
          path: docs/reference/tiger-target-baseline/${{ env.TIGER_RUN_DATE }}
          if-no-files-found: ignore
          retention-days: 14

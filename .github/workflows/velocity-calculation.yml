name: Velocity Calculation

on:
  schedule:
    # Run every 6 hours; hourly recalculation was adding shared-pool load without matching user-facing value.
    - cron: '50 */6 * * *'
  workflow_dispatch:

env:
  DATA_READ_TARGET: tiger
  DATA_WRITE_TARGET: tiger
  TIGER_PRIMARY_URL: ${{ secrets.TIGER_PRODUCTION_URL }}

concurrency:
  group: velocity-calculation
  cancel-in-progress: false

jobs:
  calculate:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_TIGER_METRICS_WRITERS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Calculate velocity and update tiers
        run: pnpm --filter @publisheriq/ingestion calculate-velocity
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          VELOCITY_BATCH_SIZE: '1000'

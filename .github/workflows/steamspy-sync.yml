name: SteamSpy Sync

on:
  schedule:
    - cron: '15 2 * * *' # 2:15 AM UTC daily
  workflow_dispatch:
    inputs:
      max_pages:
        description: 'Maximum pages to fetch (0 = all)'
        required: false
        default: '1'

env:
  DATA_READ_TARGET: tiger
  DATA_WRITE_TARGET: tiger
  TIGER_PRIMARY_URL: ${{ secrets.TIGER_PRODUCTION_URL }}

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_TIGER_METRICS_WRITERS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run SteamSpy sync
        run: pnpm --filter @publisheriq/ingestion steamspy-sync
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '0' }}
          SUPPLEMENTARY_LIMIT: '0'

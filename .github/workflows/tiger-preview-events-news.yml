name: Tiger Preview Events/News

on:
  workflow_dispatch:
    inputs:
      events_news_tables:
        description: "Optional comma-separated EVENTS_NEWS_SYNC_TABLES override"
        required: false
        default: ""
      event_day_lookback:
        description: "Trailing UTC days to replay for app_change_events"
        required: false
        default: "3"
      news_day_lookback:
        description: "Trailing UTC days to replay for steam_news_items"
        required: false
        default: "7"
      projection_day_lookback:
        description: "Trailing UTC days of projection churn to consider"
        required: false
        default: "7"
      projection_repair_scope:
        description: "Projection repair scope for events/news reconcile (recent_window or exact_parity)"
        required: false
        default: "recent_window"
      stop_after_classification:
        description: "Stop after initial classification and skip retries, fallback, and final validate"
        required: false
        type: boolean
        default: false

concurrency:
  group: tiger-preview-events-news
  cancel-in-progress: false

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  TIGER_PRIMARY_URL: ${{ secrets.TIGER_PREVIEW_URL }}
  DATA_PLANE_STATEMENT_TIMEOUT_MS: "15000"
  EVENTS_NEWS_TABLES: ${{ github.event.inputs.events_news_tables || '' }}
  EVENT_DAY_LOOKBACK: ${{ github.event.inputs.event_day_lookback || '3' }}
  NEWS_DAY_LOOKBACK: ${{ github.event.inputs.news_day_lookback || '7' }}
  PROJECTION_DAY_LOOKBACK: ${{ github.event.inputs.projection_day_lookback || '7' }}
  PROJECTION_REPAIR_SCOPE: ${{ github.event.inputs.projection_repair_scope || 'recent_window' }}
  STOP_AFTER_CLASSIFICATION: ${{ github.event.inputs.stop_after_classification || 'false' }}

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build sync packages
        run: pnpm --filter @publisheriq/shared build && pnpm --filter @publisheriq/data-plane build

      - name: Compute sync windows
        run: |
          echo "TIGER_RUN_DATE=$(date -u +%F)" >> "$GITHUB_ENV"

      - name: Reconcile Tiger events and news
        id: reconcile_events_news
        continue-on-error: true
        run: pnpm tiger:reconcile-events-news
        env:
          DATA_PLANE_STATEMENT_TIMEOUT_MS: "120000"
          EVENTS_NEWS_SYNC_EVENT_DAY_LOOKBACK: ${{ env.EVENT_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_MANIFEST_LABEL: tiger-preview-events-news-reconcile-${{ github.run_id }}
          EVENTS_NEWS_SYNC_MODE: reconcile
          EVENTS_NEWS_SYNC_NEWS_DAY_LOOKBACK: ${{ env.NEWS_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_DAY_LOOKBACK: ${{ env.PROJECTION_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_REPAIR_SCOPE: ${{ env.PROJECTION_REPAIR_SCOPE }}
          EVENTS_NEWS_SYNC_TABLES: ${{ env.EVENTS_NEWS_TABLES }}

      - name: Inspect Tiger events/news reconcile manifest
        id: inspect_reconcile_manifest
        if: always()
        env:
          RECONCILE_MANIFEST_PATH: docs/reference/tiger-target-baseline/${{ env.TIGER_RUN_DATE }}/tiger-preview-events-news-reconcile-${{ github.run_id }}/events-news-sync-manifest.json
          RECONCILE_OUTCOME: ${{ steps.reconcile_events_news.outcome }}
          REQUESTED_PROJECTION_REPAIR_SCOPE: ${{ env.PROJECTION_REPAIR_SCOPE }}
          STOP_AFTER_CLASSIFICATION: ${{ env.STOP_AFTER_CLASSIFICATION }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const outputPath = process.env.GITHUB_OUTPUT;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const manifestPath = process.env.RECONCILE_MANIFEST_PATH;
          const reconcileOutcome = process.env.RECONCILE_OUTCOME;
          const requestedScope = process.env.REQUESTED_PROJECTION_REPAIR_SCOPE ?? 'recent_window';
          const stopAfterClassification = process.env.STOP_AFTER_CLASSIFICATION === 'true';

          function setOutput(name, value) {
            fs.appendFileSync(outputPath, `${name}=${value}\n`);
          }

          function appendSummary(line) {
            if (summaryPath) {
              fs.appendFileSync(summaryPath, `${line}\n`);
            }
          }

          const defaults = {
            classification: 'initial_reconcile_succeeded',
            manifest_found: 'false',
            manifest_parsed: 'false',
            needs_app_change_retry: 'false',
            needs_exact_parity_fallback: 'false',
            validate_projection_repair_scope: requestedScope,
          };

          for (const [key, value] of Object.entries(defaults)) {
            setOutput(key, value);
          }

          if (reconcileOutcome !== 'failure') {
            appendSummary(`Initial Tiger events/news reconcile succeeded with scope \`${requestedScope}\`.`);
            if (stopAfterClassification) {
              appendSummary('Smoke mode enabled: stopping after initial classification.');
            }
            process.exit(0);
          }

          if (!manifestPath || !fs.existsSync(manifestPath)) {
            setOutput('classification', 'missing_manifest');
            appendSummary(
              `Initial Tiger events/news reconcile failed and did not produce a manifest at \`${manifestPath ?? '(missing path)'}\`.`
            );
            process.exit(0);
          }

          setOutput('manifest_found', 'true');

          let manifest;
          try {
            manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          } catch (error) {
            setOutput('classification', 'malformed_manifest');
            appendSummary(
              `Initial Tiger events/news reconcile failed and the manifest at \`${manifestPath}\` could not be parsed: ${error.message}`
            );
            process.exit(0);
          }

          setOutput('manifest_parsed', 'true');

          const tableSummaries = Array.isArray(manifest.tableSummaries) ? manifest.tableSummaries : [];
          const selectedTables = new Set(
            Array.isArray(manifest.settings?.selectedTables) ? manifest.settings.selectedTables : []
          );
          const validations = manifest.validations ?? {};
          const steamNewsItems = tableSummaries.find(
            (summary) => summary?.tableName === 'steam_news_items'
          );
          const appChangeEvents = tableSummaries.find(
            (summary) => summary?.tableName === 'app_change_events'
          );
          const projection = tableSummaries.find(
            (summary) => summary?.tableName === 'steam_news_search_projection'
          );

          const steamNewsSelected = selectedTables.has('steam_news_items');
          const appChangeSelected = selectedTables.has('app_change_events');
          const projectionSelected = selectedTables.has('steam_news_search_projection');

          const duplicateEventIds = Number(validations.duplicateEventIds ?? Number.NaN);
          const orphanedNewsItemGids = Number(validations.orphanedNewsItemGids ?? Number.NaN);
          const projectionRowsMissingNewsItems = Number(
            validations.projectionRowsMissingNewsItems ?? Number.NaN
          );
          const validationsZero =
            duplicateEventIds === 0 &&
            orphanedNewsItemGids === 0 &&
            projectionRowsMissingNewsItems === 0;

          const appChangeDayMismatches = Array.isArray(appChangeEvents?.dayMismatchesAfter)
            ? appChangeEvents.dayMismatchesAfter.length
            : -1;
          const appChangeHistoricalMismatches = Array.isArray(appChangeEvents?.historicalDayMismatchesAfter)
            ? appChangeEvents.historicalDayMismatchesAfter.length
            : -1;
          const projectionMonthMismatches = Array.isArray(projection?.monthMismatchesAfter)
            ? projection.monthMismatchesAfter.length
            : -1;
          const projectionDayMismatches = Array.isArray(projection?.dayMismatchesAfter)
            ? projection.dayMismatchesAfter.length
            : -1;

          const steamNewsFailed = steamNewsSelected && steamNewsItems?.passed !== true;
          const appChangeCountOnlyDrift =
            appChangeSelected &&
            appChangeEvents?.passed === false &&
            appChangeEvents?.fullCountMatches === false &&
            appChangeDayMismatches === 0 &&
            appChangeHistoricalMismatches === 0;
          const projectionRecoverableHistorical =
            requestedScope === 'recent_window' &&
            projectionSelected &&
            projection?.passed === false &&
            projectionMonthMismatches > 0 &&
            projectionDayMismatches === 0;
          const needsAppChangeRetry =
            validationsZero &&
            !steamNewsFailed &&
            appChangeCountOnlyDrift &&
            (!projectionSelected || projection?.passed === true || projectionRecoverableHistorical);
          const needsProjectionFallback =
            validationsZero &&
            !steamNewsFailed &&
            projectionRecoverableHistorical &&
            (!appChangeSelected || appChangeEvents?.passed === true || appChangeCountOnlyDrift);

          if (needsAppChangeRetry) {
            setOutput('needs_app_change_retry', 'true');
          }

          if (needsProjectionFallback) {
            setOutput('needs_exact_parity_fallback', 'true');
            setOutput('validate_projection_repair_scope', 'exact_parity');
          }

          let classification = 'reconcile_failed_unknown_shape';
          if (needsAppChangeRetry && needsProjectionFallback) {
            classification = 'app_change_events_count_only_and_historical_projection_drift';
          } else if (needsAppChangeRetry) {
            classification = 'app_change_events_count_only_drift';
          } else if (needsProjectionFallback) {
            classification = 'historical_projection_drift';
          } else if (steamNewsFailed) {
            classification = 'steam_news_items_failed';
          } else if (!validationsZero) {
            classification = 'integrity_validation_failed';
          } else if (appChangeSelected && appChangeEvents?.passed === false) {
            classification = 'app_change_events_failed';
          } else if (projectionSelected && projection?.passed === false) {
            classification =
              projectionDayMismatches > 0
                ? 'projection_recent_window_drift'
                : projectionMonthMismatches > 0
                  ? 'projection_nonrecoverable_drift'
                  : 'unexpected_projection_summary';
          }

          setOutput('classification', classification);
          appendSummary(
            `Initial Tiger events/news reconcile classification: \`${classification}\`.`
          );
          if (stopAfterClassification) {
            appendSummary('Smoke mode enabled: stopping after initial classification.');
          }
          NODE

      - name: Fail on non-recoverable Tiger events/news reconcile failure
        if: env.STOP_AFTER_CLASSIFICATION != 'true' && steps.reconcile_events_news.outcome == 'failure' && steps.inspect_reconcile_manifest.outputs.needs_app_change_retry != 'true' && steps.inspect_reconcile_manifest.outputs.needs_exact_parity_fallback != 'true'
        env:
          RECONCILE_CLASSIFICATION: ${{ steps.inspect_reconcile_manifest.outputs.classification }}
          RECONCILE_MANIFEST_PATH: docs/reference/tiger-target-baseline/${{ env.TIGER_RUN_DATE }}/tiger-preview-events-news-reconcile-${{ github.run_id }}/events-news-sync-manifest.json
        run: |
          {
            echo "Tiger events/news reconcile failed without an eligible recovery path."
            echo ""
            echo "- classification: \`${RECONCILE_CLASSIFICATION}\`"
            echo "- manifest: \`${RECONCILE_MANIFEST_PATH}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Tiger events/news reconcile failed without an eligible recovery path." >&2
          echo "classification=${RECONCILE_CLASSIFICATION}" >&2
          echo "manifest=${RECONCILE_MANIFEST_PATH}" >&2
          exit 1

      - name: Reconcile Tiger app change retry
        id: retry_app_change_reconcile
        if: env.STOP_AFTER_CLASSIFICATION != 'true' && steps.inspect_reconcile_manifest.outputs.needs_app_change_retry == 'true'
        continue-on-error: true
        run: pnpm tiger:reconcile-events-news
        env:
          DATA_PLANE_STATEMENT_TIMEOUT_MS: "120000"
          EVENTS_NEWS_SYNC_EVENT_DAY_LOOKBACK: ${{ env.EVENT_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_MANIFEST_LABEL: tiger-preview-events-news-reconcile-app-change-retry-${{ github.run_id }}
          EVENTS_NEWS_SYNC_MODE: reconcile
          EVENTS_NEWS_SYNC_NEWS_DAY_LOOKBACK: ${{ env.NEWS_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_DAY_LOOKBACK: ${{ env.PROJECTION_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_REPAIR_SCOPE: ${{ env.PROJECTION_REPAIR_SCOPE }}
          EVENTS_NEWS_SYNC_TABLES: app_change_events

      - name: Validate Tiger app change retry
        id: validate_app_change_retry
        if: always() && env.STOP_AFTER_CLASSIFICATION != 'true' && steps.inspect_reconcile_manifest.outputs.needs_app_change_retry == 'true'
        continue-on-error: true
        run: pnpm tiger:reconcile-events-news
        env:
          DATA_PLANE_STATEMENT_TIMEOUT_MS: "120000"
          EVENTS_NEWS_SYNC_EVENT_DAY_LOOKBACK: ${{ env.EVENT_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_MANIFEST_LABEL: tiger-preview-events-news-validate-app-change-retry-${{ github.run_id }}
          EVENTS_NEWS_SYNC_MODE: validate
          EVENTS_NEWS_SYNC_NEWS_DAY_LOOKBACK: ${{ env.NEWS_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_DAY_LOOKBACK: ${{ env.PROJECTION_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_REPAIR_SCOPE: ${{ env.PROJECTION_REPAIR_SCOPE }}
          EVENTS_NEWS_SYNC_TABLES: app_change_events

      - name: Inspect Tiger app change retry validate manifest
        id: inspect_app_change_retry_manifest
        if: always() && env.STOP_AFTER_CLASSIFICATION != 'true' && steps.inspect_reconcile_manifest.outputs.needs_app_change_retry == 'true'
        env:
          APP_CHANGE_VALIDATE_MANIFEST_PATH: docs/reference/tiger-target-baseline/${{ env.TIGER_RUN_DATE }}/tiger-preview-events-news-validate-app-change-retry-${{ github.run_id }}/events-news-sync-manifest.json
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const outputPath = process.env.GITHUB_OUTPUT;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const manifestPath = process.env.APP_CHANGE_VALIDATE_MANIFEST_PATH;

          function setOutput(name, value) {
            fs.appendFileSync(outputPath, `${name}=${value}\n`);
          }

          function appendSummary(line) {
            if (summaryPath) {
              fs.appendFileSync(summaryPath, `${line}\n`);
            }
          }

          const defaults = {
            app_change_retry_manifest_found: 'false',
            app_change_retry_manifest_parsed: 'false',
            app_change_retry_passed: 'false',
            app_change_retry_classification: 'app_change_retry_not_run',
          };

          for (const [key, value] of Object.entries(defaults)) {
            setOutput(key, value);
          }

          if (!manifestPath || !fs.existsSync(manifestPath)) {
            setOutput('app_change_retry_classification', 'missing_app_change_retry_manifest');
            appendSummary(
              `Tiger app change retry validate did not produce a manifest at \`${manifestPath ?? '(missing path)'}\`.`
            );
            process.exit(0);
          }

          setOutput('app_change_retry_manifest_found', 'true');

          let manifest;
          try {
            manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          } catch (error) {
            setOutput('app_change_retry_classification', 'malformed_app_change_retry_manifest');
            appendSummary(
              `Tiger app change retry validate manifest at \`${manifestPath}\` could not be parsed: ${error.message}`
            );
            process.exit(0);
          }

          setOutput('app_change_retry_manifest_parsed', 'true');

          const tableSummaries = Array.isArray(manifest.tableSummaries) ? manifest.tableSummaries : [];
          const validations = manifest.validations ?? {};
          const appChangeEvents = tableSummaries.find(
            (summary) => summary?.tableName === 'app_change_events'
          );
          const validationsZero =
            Number(validations.duplicateEventIds ?? Number.NaN) === 0 &&
            Number(validations.orphanedNewsItemGids ?? Number.NaN) === 0 &&
            Number(validations.projectionRowsMissingNewsItems ?? Number.NaN) === 0;
          const retryPassed = appChangeEvents?.passed === true && validationsZero;

          if (retryPassed) {
            setOutput('app_change_retry_passed', 'true');
            setOutput('app_change_retry_classification', 'app_change_events_retry_succeeded');
            appendSummary('Tiger app change retry validate passed.');
            process.exit(0);
          }

          const classification = !validationsZero
            ? 'app_change_retry_integrity_validation_failed'
            : appChangeEvents?.passed === false
              ? 'app_change_events_retry_failed'
              : 'unexpected_app_change_retry_manifest';

          setOutput('app_change_retry_classification', classification);
          appendSummary(`Tiger app change retry validate failed with classification \`${classification}\`.`);
          NODE

      - name: Fail on non-recoverable Tiger app change retry failure
        if: env.STOP_AFTER_CLASSIFICATION != 'true' && steps.inspect_reconcile_manifest.outputs.needs_app_change_retry == 'true' && steps.inspect_app_change_retry_manifest.outputs.app_change_retry_passed != 'true'
        env:
          APP_CHANGE_RETRY_CLASSIFICATION: ${{ steps.inspect_app_change_retry_manifest.outputs.app_change_retry_classification }}
          APP_CHANGE_VALIDATE_MANIFEST_PATH: docs/reference/tiger-target-baseline/${{ env.TIGER_RUN_DATE }}/tiger-preview-events-news-validate-app-change-retry-${{ github.run_id }}/events-news-sync-manifest.json
        run: |
          {
            echo "Tiger app change retry failed."
            echo ""
            echo "- classification: \`${APP_CHANGE_RETRY_CLASSIFICATION}\`"
            echo "- manifest: \`${APP_CHANGE_VALIDATE_MANIFEST_PATH}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Tiger app change retry failed." >&2
          echo "classification=${APP_CHANGE_RETRY_CLASSIFICATION}" >&2
          echo "manifest=${APP_CHANGE_VALIDATE_MANIFEST_PATH}" >&2
          exit 1

      - name: Reconcile Tiger projection exact parity fallback
        if: env.STOP_AFTER_CLASSIFICATION != 'true' && steps.inspect_reconcile_manifest.outputs.needs_exact_parity_fallback == 'true' && (steps.inspect_reconcile_manifest.outputs.needs_app_change_retry != 'true' || steps.inspect_app_change_retry_manifest.outputs.app_change_retry_passed == 'true')
        run: pnpm tiger:reconcile-events-news
        env:
          DATA_PLANE_STATEMENT_TIMEOUT_MS: "120000"
          EVENTS_NEWS_SYNC_EVENT_DAY_LOOKBACK: ${{ env.EVENT_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_MANIFEST_LABEL: tiger-preview-events-news-reconcile-exact-parity-${{ github.run_id }}
          EVENTS_NEWS_SYNC_MODE: reconcile
          EVENTS_NEWS_SYNC_NEWS_DAY_LOOKBACK: ${{ env.NEWS_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_DAY_LOOKBACK: ${{ env.PROJECTION_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_REPAIR_SCOPE: exact_parity
          EVENTS_NEWS_SYNC_TABLES: steam_news_search_projection

      - name: Validate Tiger events and news parity
        if: env.STOP_AFTER_CLASSIFICATION != 'true'
        run: pnpm tiger:reconcile-events-news
        env:
          DATA_PLANE_STATEMENT_TIMEOUT_MS: "120000"
          EVENTS_NEWS_SYNC_EVENT_DAY_LOOKBACK: ${{ env.EVENT_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_MANIFEST_LABEL: tiger-preview-events-news-validate-${{ github.run_id }}
          EVENTS_NEWS_SYNC_MODE: validate
          EVENTS_NEWS_SYNC_NEWS_DAY_LOOKBACK: ${{ env.NEWS_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_DAY_LOOKBACK: ${{ env.PROJECTION_DAY_LOOKBACK }}
          EVENTS_NEWS_SYNC_PROJECTION_REPAIR_SCOPE: ${{ steps.inspect_reconcile_manifest.outputs.validate_projection_repair_scope }}
          EVENTS_NEWS_SYNC_TABLES: ${{ env.EVENTS_NEWS_TABLES }}

      - name: Upload Tiger preview events/news manifests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiger-preview-events-news-${{ github.run_id }}
          path: docs/reference/tiger-target-baseline/${{ env.TIGER_RUN_DATE }}
          if-no-files-found: ignore
          retention-days: 14
